<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h2 id="titulo"> Formulário de Inscrição</h2></header>
    <main>
        <form>
            <label for="nome" id="nome">Nome:</label>
            <input type="text" placeholder="Digite seu nome completo" name="nomeCompleto" id="nomeCompleto">
    
            <label>Nome Social:</label>
            <input type="text" placeholder="*Campo não obrigatório">
    
            <label>CPF:</label>
            <input type="number" placeholder="Digite seu CPF">
    
            <label>Celular:</label>
            <input type="number" placeholder="Digite seu número">
    
            <label>E-mail:</label>
            <input type="text" placeholder="Digite seu e-mail">

            <input type="submit" id="button">
        </form>
    </main>
    
    <footer> <strong>&copy; Desenvolvido por Juliana Pereira Lacerda</strong></footer>
</body>
</html>
